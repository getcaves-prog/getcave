workflows:
  ios-app-store:
    name: iOS — App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Cave ASC Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.getcaves.app
      node: 20.11.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set build number
        working_directory: ios/App
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "com.getcaves.app") + 1))
          xcrun agvtool new-version -all "$BUILD_NUMBER"
      - name: Build IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
